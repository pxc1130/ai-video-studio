# TikTok US E-Commerce Video Creative Planning Prompt
# Target: Shoes, Apparel, and Outdoor Gear
# Platform: TikTok US (fast-paced, hook in first 3 seconds)
# 如需修改创意规划逻辑，直接编辑此 YAML 即可，无需修改 Python 代码。

system_prompt: |
  You are a TikTok US e-commerce video creative strategist.
  Your job is to analyze product images and facts, then output a strict JSON creative plan.
  The video must feel native to TikTok: fast-paced, authentic, influencer-style, with a strong hook in the first 3 seconds.
  Do not exaggerate. Do not invent features. Avoid absolute claims. Follow US advertising guidelines.

user_payload_template: |
  Task: Generate a creative plan for a 9:16 TikTok US product video.

  Product Category Context:
  - Category: {{ category }}
  - Category Brief: {{ category_brief }}

  Product Facts:
  {{ product_facts_json }}

  {% if script_template %}
  Script Template (user-provided, must be respected):
  {{ script_template }}
  {% endif %}

  Constraints:
  - Scene count: strictly {{ scene_count }}
  - Each scene: 3-4 seconds, total ~9-12 seconds
  - Must bind every scene to a real reference image
  - Target platform: TikTok US (fast-paced, authentic, hook in first 3s)
  - Shot goals should match TikTok native styles: unboxing, fit-check, real-usage, close-up detail, price reveal
  - wan_prompt must be in English, optimized for image-to-video models (Wan, Veo, etc.)
  - negative_prompt must be in English
  - overlay_text must be short, punchy, influencer-style captions (English), NOT internal instructions

  Required JSON schema:
  {
    "product": {...},
    "material_analysis": {"subject_summary", "core_selling_points", "image_role_map", "scene_strategy"},
    "creative_direction": {"audience", "tone", "hook", "core_message", "cta"},
    "compliance": {"allowed_claims", "forbidden_claims", "review_summary"},
    "video_style": {"aspect_ratio", "duration_seconds", "style_tags", "music_direction", "subtitle_style", "transition_style"},
    "scenes": [
      {
        "scene_id": "scene_1",
        "reference_image": "main.jpg",
        "duration_seconds": 3,
        "shot_goal": "...",
        "camera_language": "...",
        "wan_prompt": "English prompt for video model...",
        "negative_prompt": "English negative prompt...",
        "overlay_text": {"headline": "...", "subline": "...", "price_tag": "$XX"},
        "energy": "high"
      }
    ]
  }

category_briefs:
  shoes: |
    Focus on comfort, fit, durability, and real outdoor usage scenarios like trail running, hiking, or urban commuting.
    Highlight close-ups of sole texture, breathable mesh, lacing systems, and on-foot shots.
  apparel: |
    Highlight breathability, moisture-wicking, layering versatility, seasonal adaptability, and fit.
    Show real people wearing the item in motion: running, hiking, gym sessions.
  outdoor_gear: |
    Show ruggedness, portability, weather resistance, and genuine adventure contexts.
    Demonstrate real usage: setting up a tent, using a multi-tool, packing gear.
  default: |
    Focus on authentic product presentation, clear selling points, and real usage context suitable for TikTok US audience.
